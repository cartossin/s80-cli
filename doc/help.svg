<text y="182"><tspan x="16.0" textLength="244.5" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">usage: s80 [options] &lt;target&gt;</tspan></text>
<text y="220"><tspan x="16.0" textLength="598.5" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">  -c, --count &lt;n&gt;     stop after n probes (default 1000; 0 = unlimited)</tspan></text>
<text y="239"><tspan x="16.0" textLength="556.4" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">  -t, --secs &lt;n&gt;      stop after n seconds instead (0 = unlimited)</tspan></text>
<text y="258"><tspan x="16.0" textLength="488.9" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">  -d, --delay &lt;ms&gt;    delay between probes in milliseconds</tspan></text>
<text y="277"><tspan x="16.0" textLength="615.4" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">  -T, --timeout &lt;ms&gt;  starting probe timeout (autotuned from there: grows</tspan></text>
<text y="296"><tspan x="16.0" textLength="666.0" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">                      while probes time out, tracks the path once replies flow)</tspan></text>
<text y="315"><tspan x="16.0" textLength="438.4" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">  -u, --udp           use UDP probes instead of ICMP</tspan></text>
<text y="334"><tspan x="16.0" textLength="488.9" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">      --port &lt;n&gt;      UDP destination port (default 33434)</tspan></text>
<text y="353"><tspan x="16.0" textLength="488.9" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">      --color &lt;when&gt;  auto | always | never (default auto)</tspan></text>
<text y="372"><tspan x="16.0" textLength="666.0" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">      --256           force 256-color palette (default: truecolor if COLORTERM)</tspan></text>
<text y="391"><tspan x="16.0" textLength="295.1" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">  -V, --version       print version</tspan></text>
<text y="410"><tspan x="16.0" textLength="261.3" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">  -h, --help          this text</tspan></text>
<text y="448"><tspan x="16.0" textLength="657.5" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">glyphs:  '!' reply, colored blue (us) -&gt; green (~1ms) -&gt; red (slow), log scale</tspan></text>
<text y="467"><tspan x="16.0" textLength="573.2" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">         '.' timeout   ',' late reply that arrived after its timeout</tspan></text>
<text y="486"><tspan x="16.0" textLength="607.0" lengthAdjust="spacingAndGlyphs" fill="#c9d1d9">                           (the '.' is repainted in place when possible)</tspan></text>
</g></svg>
